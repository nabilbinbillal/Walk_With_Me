kind = "web"
previewPath = "/"
title = "Let's Walk Noshin"
version = "1.0.0"
id = "artifacts/noshin-walks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23740

[services.development]
run = "pnpm --filter @workspace/noshin-walks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noshin-walks", "run", "build" ]
publicDir = "artifacts/noshin-walks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23740"
BASE_PATH = "/"
